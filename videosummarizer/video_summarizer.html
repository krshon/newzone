<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NEWZON Video Speech Summarizer</title>

<style>

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
    padding: 40px;
}

.container {
    max-width: 800px;
    margin: auto;
}

.video-box {
    background: rgba(255,255,255,0.08);
    padding: 20px;
    margin: 20px 0;
    border-radius: 10px;
}

button {
    background: #ff9800;
    border: none;
    padding: 10px 18px;
    font-size: 15px;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #ffa733;
}

.spinner {
    border: 6px solid rgba(255,255,255,0.2);
    border-top: 6px solid #ff9800;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    margin: 20px auto;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

#loader {
    display: none;
}

#summaryBox {
    display: none;
    margin-top: 30px;
    background: rgba(0,0,0,0.3);
    padding: 20px;
    border-radius: 10px;
}

</style>
</head>


<body>

<div class="container">

<h1>🎬 NEWZON Speech Video Summarizer</h1>

<p>Upload a video OR summarize one of the sample speeches below.</p>


<!-- Upload section -->

<input type="file" id="videoInput" accept="video/mp4">
<br><br>

<button onclick="uploadVideo()">Summarize Uploaded Video</button>


<!-- Sample videos -->

<div class="video-box">
    <h3>Sample Speech 1</h3>
    <video width="400" controls>
        <source src="/videos/sample1.mp4" type="video/mp4">
    </video>
    <br><br>
    <button onclick="summarizeExisting('videos/sample1.mp4')">
        Summarize This Video
    </button>
</div>


<div class="video-box">
    <h3>Sample Speech 2</h3>
    <video width="400" controls>
        <source src="/videos/sample2.mp4" type="video/mp4">
    </video>
    <br><br>
    <button onclick="summarizeExisting('videos/sample2.mp4')">
        Summarize This Video
    </button>
</div>


<!-- Loader -->

<div id="loader">
    <p>Processing video... please wait ⏳</p>
    <div class="spinner"></div>
</div>


<!-- Summary output -->

<div id="summaryBox">
    <h3>📄 Summary</h3>
    <p id="summaryText"></p>
</div>

</div>


<script>

async function uploadVideo() {

    const file = document.getElementById("videoInput").files[0];

    if (!file) {
        alert("Upload a video first.");
        return;
    }

    sendVideo(file);

}


async function summarizeExisting(filename) {

    const formData = new FormData();
    formData.append("existing_video", filename);

    processRequest(formData);

}


async function sendVideo(file) {

    const formData = new FormData();
    formData.append("video", file);

    processRequest(formData);

}


async function processRequest(formData) {

    document.getElementById("loader").style.display = "block";
    document.getElementById("summaryBox").style.display = "none";

    const response = await fetch("/summarize", {
        method: "POST",
        body: formData
    });

    const data = await response.json();

    document.getElementById("loader").style.display = "none";
    document.getElementById("summaryBox").style.display = "block";

    document.getElementById("summaryText").innerText =
    data.summary || data.error || "Summary not returned.";

}

</script>

</body>
</html>
